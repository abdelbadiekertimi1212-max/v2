<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset your EcoMate Password</title>
    <style>
        body { font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #050a14; color: #ffffff; padding: 20px; line-height: 1.6; }
        .container { max-width: 500px; margin: 0 auto; background-color: #0a1628; border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 40px; text-align: center; }
        .logo { font-size: 26px; font-weight: 800; margin-bottom: 24px; }
        .logo span:first-child { color: #2563eb; }
        .logo span:last-child { color: #10B981; }
        .message { font-size: 15px; color: rgba(255,255,255,0.7); margin-bottom: 32px; }
        .btn { display: inline-block; background: linear-gradient(135deg, #10B981, #059669); color: #fff; text-decoration: none; padding: 14px 32px; border-radius: 12px; font-weight: 700; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); }
        .footer { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><span>Eco</span><span>Mate</span></div>
        <h2 style="margin: 0 0 16px;">Password Reset 🔐</h2>
        <div class="message">
            We received a request to reset your EcoMate account password. Click the button below to choose a new password.
        </div>
        <a href="{{ .ConfirmationURL }}" class="btn">Reset Password</a>
        <div class="footer">
            If you didn't request a password reset, you can safely ignore this email.<br>
            &copy; 2026 EcoMate DZ. All rights reserved.
        </div>
    </div>
</body>
</html>
